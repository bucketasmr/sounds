<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR | LOADING PROGRESS</title>
<style>
  /* ... (весь твой CSS остается прежним, добавляю только стили для прогресса) ... */
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: Arial, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:26px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.2); color:white; cursor:pointer; font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; }
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.5); }
  .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px; width: 100%; max-width: 600px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5; }
  
  .sound-button { 
    aspect-ratio: 1 / 1; border: none; border-radius: 20px; 
    background: rgba(255,255,255,0.15); color:white; font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(8px); transition: 0.3s; font-size: 12px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
  }

  /* Стили прогресса */
  .progress-text { font-size: 10px; opacity: 0.7; margin-top: 4px; font-weight: normal; }
  .bg-progress {
    position: absolute; bottom: 0; left: 0; width: 0%; height: 100%;
    background: rgba(255, 180, 0, 0.1); z-index: -1; transition: width 0.2s;
  }
  .sound-button.loading { border-color: #ffb400; }
  
  /* Оригинальные стили из твоего кода */
  .sound-button.active { box-shadow: 0 0 15px rgba(255,255,255,0.3); }
  .tile-vis { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 30px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; display: none; }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; }
  .sound-button.active .tile-vis { display: block; }
  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
  .modal-content { background: rgba(20, 20, 35, 0.95); border: 1px solid #ffb400; padding: 30px; border-radius: 24px; text-align: center; color: white; max-width: 85%; }
  .modal-btn { background:#ffb400; border:none; padding:12px 30px; border-radius:12px; font-weight:bold; cursor:pointer; color:black; margin-top: 10px; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <h2 style="color: #ffb400; margin-top: 0;">Smart ASMR Player</h2>
    <p>Нажми "Поехали", чтобы начать загрузку звуков с индикацией прогресса.</p>
    <button class="modal-btn" id="closeWelcome">Поехали!</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <button id="langBtn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="repairBtn" onclick="location.reload()">RELOAD</button>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let langIdx = 0;
const langOrder = ['en', 'uk', 'ru'];
let audioElements=[], randomActive=false;

const sounds = [
  {file:'purplebrush.mp3', name:{en:'Brush', ru:'Кисть', uk:'Пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'choko.mp3', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'strawberry.mp3', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'wax.mp3', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'woodandrocks.mp3', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { loading: "Loading", ready: "Ready" },
  ru: { loading: "Загрузка", ready: "Готов" },
  uk: { loading: "Завантаження", ready: "Готов" }
};

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.connect(audioCtx.destination);
}

// ГЛАВНАЯ ФУНКЦИЯ ЗАГРУЗКИ С ПРОГРЕССОМ
function loadWithProgress(state, file) {
  const xhr = new XMLHttpRequest();
  const url = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${file}?v=${Date.now()}`;
  
  xhr.open('GET', url, true);
  xhr.responseType = 'blob';

  xhr.onprogress = (event) => {
    if (event.lengthComputable) {
      const percent = Math.round((event.loaded / event.total) * 100);
      state.btn.querySelector('.progress-text').innerText = `${percent}%`;
      state.btn.querySelector('.bg-progress').style.width = `${percent}%`;
    } else {
      state.btn.querySelector('.progress-text').innerText = "...";
    }
  };

  xhr.onload = function() {
    if (xhr.status === 200) {
      const blob = xhr.response;
      state.audio.src = URL.createObjectURL(blob);
      state.ready = true;
      state.btn.classList.remove('loading');
      state.btn.querySelector('.progress-text').innerText = "";
      state.btn.querySelector('.bg-progress').style.width = "0%";
    } else {
      state.btn.querySelector('.progress-text').innerText = "Err";
    }
  };

  xhr.onerror = () => state.btn.querySelector('.progress-text').innerText = "Retry";
  xhr.send();
}

const grid = document.getElementById('soundGrid');
sounds.forEach((s, idx) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button loading';
  btn.innerHTML = `
    <div class="bg-progress"></div>
    <span class="name-text">${s.name['en']}</span>
    <span class="progress-text">0%</span>
    <div class="tile-vis"><div class="tile-vis-bar"></div></div>
  `;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true;
  audio.crossOrigin = "anonymous";

  const state = { 
    audio, btn, ready: false, color: s.color, 
    visBar: btn.querySelector('.tile-vis-bar'), 
    source: null, gainNode: null, analyser: null 
  };

  btn.onclick = () => {
    initAudioContext();
    if (!state.ready) return;
    audio.paused ? fadeIn(state) : fadeOut(state);
  };

  audioElements.push(state);
  loadWithProgress(state, s.file);
});

// Логика FadeIn / FadeOut (твоя оригинальная)
function fadeIn(el) {
  el.audio.play().then(() => {
    if (!el.source) {
        el.source = audioCtx.createMediaElementSource(el.audio);
        el.gainNode = audioCtx.createGain();
        el.analyser = audioCtx.createAnalyser();
        el.source.connect(el.gainNode);
        el.gainNode.connect(el.analyser);
        el.analyser.connect(globalAnalyser);
    }
    el.btn.classList.add('active');
    el.gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.2);
  });
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  if(el.gainNode) el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
  setTimeout(() => { if(!el.btn.classList.contains('active')) el.audio.pause(); }, 500);
}

// Визуализация звезд (упрощенная для примера)
const vCanvas = document.getElementById('vis'); const vCtx = vCanvas.getContext('2d');
function res() { vCanvas.width = innerWidth; vCanvas.height = innerHeight; }
window.onresize = res; res();

function animate() {
  vCtx.clearRect(0,0,innerWidth,innerHeight);
  audioElements.forEach(el => {
    if(el.analyser && el.btn.classList.contains('active')) {
      const data = new Uint8Array(el.analyser.frequencyBinCount);
      el.analyser.getByteFrequencyData(data);
      const vol = data[0];
      el.visBar.style.width = `${(vol/255)*100}%`;
      el.btn.style.backgroundColor = el.color.replace('0.5', (0.15 + (vol/255)*0.5));
    }
  });
  requestAnimationFrame(animate);
}
animate();

document.getElementById('closeWelcome').onclick = () => {
    initAudioContext();
    document.getElementById('welcomeModal').style.display='none';
};
</script>
</body>
</html>
