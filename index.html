<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUCKET ASMR</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  body::after {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: transparent url('https://raw.githubusercontent.com/andreygolikov/star-background/main/stars.png') repeat top center;
    z-index:0;
    pointer-events:none;
  }

  .overlay {
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.4);
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
    font-size: 28px;
    color: #ffb400;
    text-shadow: 0 0 10px #ffb400;
    text-align: center;
  }

  .lang-buttons, .random-controls {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
  }

  .lang-buttons button, .random-controls button, .random-controls select {
    padding: 8px 14px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    backdrop-filter: blur(5px);
  }

  .lang-buttons button:hover, .random-controls button:hover, .random-controls select:hover {
    background: rgba(255,255,255,0.4);
  }

  .sound-grid {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 20px;
    padding-bottom: 20px;
    width: 100%;
    justify-content: center;
  }

  .sound-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 70px;
  }

  .volume-slider {
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    outline: none;
    cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffb400;
    box-shadow: 0 0 5px #ffb400;
    cursor: pointer;
  }

  .volume-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffb400;
    cursor: pointer;
    box-shadow: 0 0 5px #ffb400;
  }

  .sound-button {
    width: 70px;
    height: 40px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(6px);
    transition: 0.2s;
  }

  .sound-button.active {
    box-shadow: 0 0 10px #fff;
  }

  canvas {
    position: fixed;
    top:0; left:0;
    z-index: 0;
  }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
  <h1 id="title">BUCKET ASMR</h1>

  <div class="lang-buttons">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('ru')">Русский</button>
    <button onclick="setLang('uk')">Українська</button>
  </div>

  <div class="random-controls">
    <button id="randomBtn">Random OFF</button>
    <select id="randomInterval">
      <option value="0">Произвольно</option>
      <option value="30">30 секунд</option>
      <option value="60">1 минута</option>
      <option value="120">2 минуты</option>
      <option value="300">5 минут</option>
    </select>
  </div>

  <div class="sound-grid" id="soundGrid"></div>
</div>

<canvas id="vis"></canvas>

<script>
const sounds = [
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/purplebrush.wav', name: {en:'Brush', ru:'Кисть', uk:'Пензель'}, color: 'rgba(150,100,255,0.2)'},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/choko.wav', name: {en:'Choko', ru:'Шоколад', uk:'Шоколад'}, color: 'rgba(139,69,19,0.2)'},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/strawberry.wav', name: {en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color: 'rgba(255,105,180,0.2)'},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/wax.wav', name: {en:'Wax', ru:'Воск', uk:'Віск'}, color: 'rgba(255,165,0,0.2)'},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/woodandrocks.wav', name: {en:'Wood & Rocks', ru:'Дерево и камни', uk:'Дерево і камені'}, color: 'rgba(255,255,0,0.2)'},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/bigpink.wav', name: {en:'Pink brush', ru:'Розовая щетка', uk:'Рожева щiтка'}, color: 'rgba(255,182,193,0.2)'}
];

let lang = 'en';
const grid = document.getElementById('soundGrid');
const audioElements = [];
const particles = [];

function setLang(l){
  lang = l;
  document.getElementById('title').innerText = lang==='en'?'BUCKET ASMR':(lang==='ru'?'ВЕДРО АСМР':'ВIДРО АСМР');
  audioElements.forEach((a,i)=>{ a.btn.innerText = sounds[i].name[lang]; });
}

// Создаем треки
sounds.forEach((s,i)=>{
  const track = document.createElement('div');
  track.className = 'sound-track';
  track.innerHTML = `
    <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    <button class="sound-button">${s.name[lang]}</button>
  `;
  grid.appendChild(track);

  const audio = new Audio(s.file);
  audio.loop = true;
  audio.volume = 0.5;

  const slider = track.querySelector('.volume-slider');
  const btn = track.querySelector('.sound-button');

  slider.addEventListener('input', e => { audio.volume = e.target.value; });
  btn.addEventListener('click', e=>{
    if(audio.paused){
      audio.play();
      btn.classList.add('active');
    } else {
      audio.pause();
      btn.classList.remove('active');
    }
  });

  audioElements.push({audio, btn, slider, color: s.color});
});

// визуализация частиц
const canvas = document.getElementById('vis');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function animate(){
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  audioElements.forEach(a=>{
    if(!a.audio.paused && Math.random() < 0.3){
      particles.push({
        x: Math.random()*canvas.width,
        y: canvas.height + 10,
        radius: a.audio.volume*15 + Math.random()*10,
        speed: 0.2 + Math.random()*0.3,
        alpha: 0.05 + Math.random()*0.1,
        color: a.color
      });
    }
  });

  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.y -= p.speed;
    p.alpha *= 0.995;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle = p.color.replace('0.2', p.alpha.toFixed(2));
    ctx.fill();
    if(p.alpha < 0.01) particles.splice(i,1);
  }

  audioElements.forEach(a=>{
    if(!a.audio.paused){
      a.btn.style.backgroundColor = a.color.replace('0.2','0.7');
    } else {
      a.btn.style.backgroundColor = 'rgba(255,255,255,0.3)';
    }
  });

  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Randomizer
let randomActive = false;
let randomTimer = null;

const randomBtn = document.getElementById('randomBtn');
const randomInterval = document.getElementById('randomInterval');

randomBtn.addEventListener('click', ()=>{
  randomActive = !randomActive;
  randomBtn.innerText = randomActive ? 'Random ON' : 'Random OFF';
  if(randomActive) scheduleRandom();
  else clearTimeout(randomTimer);
});

function scheduleRandom(){
  let intervalSec = parseInt(randomInterval.value);
  if(intervalSec === 0) intervalSec = Math.floor(Math.random()*10)+5; // случайно 5-15 секунд
  randomTimer = setTimeout(()=>{
    triggerRandom();
    if(randomActive) scheduleRandom();
  }, intervalSec*1000);
}

function triggerRandom(){
  const total = audioElements.length;
  const activeCount = Math.floor(Math.random()*(total)+1); // от 1 до total
  const indices = Array.from({length: total}, (_, i)=>i);
  shuffle(indices);
  const selected = indices.slice(0, activeCount);

  audioElements.forEach((a,i)=>{
    if(selected.includes(i)){
      if(a.audio.paused){ a.audio.play(); a.btn.classList.add('active'); }
    } else {
      if(!a.audio.paused){ a.audio.pause(); a.btn.classList.remove('active'); }
    }
  });
}

// Перемешивание массива
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
</script>
</body>
</html>
