<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR Premium</title>
<style>
  /* Стили экрана блокировки */
  #pass-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
    z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s;
  }
  #pass-screen.hidden { opacity: 0; visibility: hidden; }
  
  .lock-box {
    background: rgba(255, 255, 255, 0.05); border: 1px solid #ffb400;
    padding: 40px 30px; border-radius: 30px; backdrop-filter: blur(20px);
    text-align: center; box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); width: 280px;
  }
  
  .lock-box h2 { color: #ffb400; margin-bottom: 20px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
  
  #pass-input {
    width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 18px;
    margin-bottom: 15px; outline: none; box-sizing: border-box; -webkit-appearance: none;
  }
  
  .pass-btn {
    background: #ffb400; color: black; border: none; padding: 12px 25px;
    border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;
  }
  
  .error-msg { color: #ff5050; font-size: 13px; margin-top: 10px; display: none; }

  /* Основной интерфейс */
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505; transition: background 2s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    color: white; overflow: hidden; touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg { background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%); }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.3); z-index:3; pointer-events: none; }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  
  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:24px; color:#ffb400; text-shadow:0 0 10px rgba(255,180,0,0.5); }
  #helpBtn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); font-weight: bold; }
  .lang-btn-ui { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); padding: 8px 14px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
  
  /* Контроллеры */
  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.15); color:white; cursor:pointer; font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; }
  #sleepBtn.active { background: rgba(40, 50, 100, 0.8); color: #ffb400; border: 1px solid #ffb400; }
  
  /* Сетка звуков */
  .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; width: 100%; max-width: 500px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5; -webkit-overflow-scrolling: touch; }
  .sound-button { aspect-ratio: 1 / 1; border: none; border-radius: 20px; background: rgba(255,255,255,0.05); color:rgba(255,255,255,0.3); font-weight:bold; cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; backdrop-filter: blur(8px); transition: 0.3s; font-size: 11px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
  .sound-button.active { color: white; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
  .mute-btn { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; }
  .sound-button.active .mute-btn { display: flex; }
  .tile-vis { position: absolute; bottom: 8px; left: 10%; width: 80%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; display: none; overflow: hidden; }
  .sound-button.active .tile-vis { display: block; }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; transition: width 0.1s; }

  /* Скорость */
  .custom-select-container { position: relative; }
  .select-trigger { padding: 8px 14px; border-radius: 12px; background: rgba(255, 255, 255, 0.15); color: white; cursor: pointer; font-weight: bold; font-size: 13px; min-width: 80px; text-align: center; }
  .custom-dropdown { display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid #444; border-radius: 12px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 100px; }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 12px; border: none; background: transparent; color: white; border-bottom: 1px solid #333; font-weight: bold; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; transition: opacity 1s; }
  canvas.hidden { opacity: 0; }

  /* Модальное окно (СПРАВКА) */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
  .modal-content { 
    background: #111; border: 1px solid #ffb400; padding: 25px; border-radius: 25px; 
    max-width: 85%; width: 350px; max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .modal-tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #333; }
  .tab-btn { background: none; border: none; color: #777; font-weight: bold; padding: 10px 0; cursor: pointer; font-size: 14px; }
  .tab-btn.active { color: #ffb400; border-bottom: 2px solid #ffb400; }
  
  .help-section { display: none; }
  .help-section.active { display: block; }
  .help-list { list-style: none; padding: 0; margin: 0; }
  .help-list li { margin-bottom: 12px; font-size: 14px; line-height: 1.4; color: #ccc; }
  .help-list li b { color: #ffb400; }
  .help-list li span { color: #ffb400; margin-right: 5px; }

  .modal-btn { background:#ffb400; border:none; padding:14px; border-radius:15px; font-weight:bold; width: 100%; margin-top: 10px; font-size: 16px; }
</style>
</head>
<body class="fancy-bg">

<div id="pass-screen">
  <div class="lock-box">
    <h2>Access Code</h2>
    <input type="password" id="pass-input" placeholder="••••••••">
    <button class="pass-btn" onclick="checkPass()">Unlock</button>
    <div id="error-msg" class="error-msg">Invalid access code</div>
  </div>
</div>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal">
  <div class="modal-content">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="color: #ffb400; margin: 0; font-size: 18px;">BUCKET Premium</h2>
        <button class="lang-btn-ui lang-switcher-btn" style="transform: scale(0.8);">EN</button>
    </div>
    <div class="modal-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-features')" id="tabTitleFeatures">Functions</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-guide')" id="tabTitleGuide">Guide</button>
    </div>
    <div id="tab-features" class="help-section active"><ul class="help-list" id="featuresList"></ul></div>
    <div id="tab-guide" class="help-section"><ul class="help-list" id="guideList"></ul></div>
    <button class="modal-btn" id="closeWelcome">START</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div id="helpBtn" onclick="showHelp()">?</div>
    <button id="langBtn" class="lang-btn-ui lang-switcher-btn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="sleepBtn">Sleep: OFF</button>
    <button id="repairBtn">REPAIR</button>
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger">Fast</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(11, 'fast')">Fast</button>
            <button onclick="setSpeed(24, 'medium')">Medium</button>
            <button onclick="setSpeed(46, 'slow')">Slow</button>
        </div>
    </div>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
// --- ПАРОЛЬ ---
function checkPass() {
  const input = document.getElementById('pass-input').value;
  if (btoa(input) === 'YnVja2V0MjAyNg==') {
    document.getElementById('pass-screen').classList.add('hidden');
    document.getElementById('welcomeModal').style.display = 'flex';
    updateUI(); 
    initAudioContext();
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}

// --- ДАННЫЕ И ПЕРЕВОД ---
let audioCtx = null, globalAnalyser = null;
let currentSpeedValue = 11, currentSpeedKey = 'fast', langIdx = 0, randomActive = false;
let sleepMode = false, wakeLock = null;
const langOrder = ['en', 'pt', 'uk', 'ru'];

const sounds = [
  { "file": "purplebrush.mp3", "name": { "en": "Purple Brush", "pt": "Pincel Roxo", "ru": "Фиолетовая кисть", "uk": "Фіолетовий пензель" }, "color": "rgba(150,100,255,0.5)" },
  { "file": "greybrush.mp3", "name": { "en": "Grey Brush", "pt": "Pincel Cinza", "ru": "Серая кисть", "uk": "Сірий пензель" }, "color": "rgba(140,140,140,0.5)" },
  { "file": "pinksoftbrush.mp3", "name": { "en": "Soft Brush", "pt": "Pincel Macio", "ru": "Мягкая кисть", "uk": "М’який пензель" }, "color": "rgba(255,182,193,0.5)" },
  { "file": "strawberry.mp3", "name": { "en": "Strawberry", "pt": "Morango", "ru": "Клубника", "uk": "Полуниця" }, "color": "rgba(255,105,180,0.5)" },
  { "file": "wax.mp3", "name": { "en": "Wax", "pt": "Cera", "ru": "Воск", "uk": "Віск" }, "color": "rgba(255,165,0,0.5)" },
  { "file": "carrot.mp3", "name": { "en": "Carrot", "pt": "Cenoura", "ru": "Морковь", "uk": "Морква" }, "color": "rgba(255,140,0,0.5)" },
  { "file": "choko.mp3", "name": { "en": "Choco", "pt": "Chocolate", "ru": "Шоколад", "uk": "Шоколад" }, "color": "rgba(139,69,19,0.5)" },
  { "file": "wood.mp3", "name": { "en": "Wood", "pt": "Madeira", "ru": "Дерево", "uk": "Дерево" }, "color": "rgba(255,255,0,0.5)" },
  { "file": "oldphone.mp3", "name": { "en": "Old Phone", "pt": "Telefone Antigo", "ru": "Телефон", "uk": "Телефон" }, "color": "rgba(50,50,50,0.5)" }
];

const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", repair: "REPAIR", sleep: "Sleep", tabFeatures: "Functions", tabGuide: "Guide",
    features: ["<span>✦</span> <b>Full Library:</b> All sounds unlocked.", "<span>✦</span> <b>Stay Awake:</b> Screen won't dim.", "<span>✦</span> <b>Mixer:</b> Layer sounds together.", "<span>✦</span> <b>Sleep:</b> Dark mode for battery."],
    guide: ["<b>1. Manual:</b> Tap icons to start/stop.", "<b>2. Mix:</b> Play multiple sounds at once.", "<b>3. Auto:</b> Press <b>PLAY</b> for random mode.", "<b>4. Mute:</b> Use the tiny icon on active tiles.", "<b>5. Battery:</b> Use <b>SLEEP</b> to turn off effects and save energy."],
    speeds: { slow: "Slow", medium: "Medium", fast: "Fast" }
  },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", repair: "ЧИНИТЬ", sleep: "Сон", tabFeatures: "Функции", tabGuide: "Инструкция",
    features: ["<span>✦</span> <b>Библиотека:</b> Все звуки открыты.", "<span>✦</span> <b>Бодрость:</b> Экран не гаснет.", "<span>✦</span> <b>Микшер:</b> Наложение звуков.", "<span>✦</span> <b>Сон:</b> Темный режим для отдыха."],
    guide: ["<b>1. Ручной:</b> Нажми на иконку звука.", "<b>2. Микс:</b> Запускай несколько звуков сразу.", "<b>3. Авто:</b> Кнопка <b>ИГРАТЬ</b> для рандома.", "<b>4. Тишина:</b> Маленький значок на иконке.", "<b>5. Заряд:</b> Кнопка <b>SLEEP</b> выключает эффекты для экономии батареи."],
    speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" }
  },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", repair: "ЛАГОДИТИ", sleep: "Сон", tabFeatures: "Функції", tabGuide: "Інструкція",
    features: ["<span>✦</span> <b>Бібліотека:</b> Всі звуки доступні.", "<span>✦</span> <b>Без сну:</b> Екран не згасає.", "<span>✦</span> <b>Міксер:</b> Накладання звуків.", "<span>✦</span> <b>Сон:</b> Темний режим для економії."],
    guide: ["<b>1. Ручний:</b> Натискай на іконки звуків.", "<b>2. Мікс:</b> Вмикай кілька звуків разом.", "<b>3. Авто:</b> Кнопка <b>ГРАТИ</b> для випадковості.", "<b>4. Тиша:</b> Малий значок на активній плитці.", "<b>5. Батарея:</b> Режим <b>SLEEP</b> вимикає візуал для економії заряду."],
    speeds: { slow: "Повільно", medium: "Середньо", fast: "Швидко" }
  },
  pt: { code: "PT", title: "BALDE ASMR", play: "Tocar", pause: "Pausa", repair: "REPARAR", sleep: "Dormir", tabFeatures: "Funções", tabGuide: "Guia",
    features: ["<span>✦</span> <b>Premium:</b> Todos os sons liberados.", "<span>✦</span> <b>Ativo:</b> A tela não apaga.", "<span>✦</span> <b>Mixer:</b> Sons simultâneos.", "<span>✦</span> <b>Sono:</b> Modo escuro total."],
    guide: ["<b>1. Manual:</b> Toque para iniciar ou parar.", "<b>2. Mix:</b> Crie camadas de sons.", "<b>3. Auto:</b> <b>TOCAR</b> para modo aleatório.", "<b>4. Mudo:</b> Use o ícone pequeno no som.", "<b>5. Bateria:</b> Use o modo <b>SLEEP</b> para poupar energia."],
    speeds: { slow: "Lento", medium: "Médio", fast: "Rápido" }
  }
};

// --- ОСНОВНЫЕ ФУНКЦИИ ---
function switchTab(e, id) {
    document.querySelectorAll('.help-section, .tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    e.currentTarget.classList.add('active');
}

function updateUI() {
    const lang = langOrder[langIdx];
    const t = uiTL[lang];
    
    document.getElementById('title').innerText = t.title;
    document.querySelectorAll('.lang-switcher-btn').forEach(b => b.innerText = t.code);
    document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
    document.getElementById('repairBtn').innerText = t.repair;
    document.getElementById('sleepBtn').innerText = `${t.sleep}: ${sleepMode ? 'ON' : 'OFF'}`;
    document.getElementById('speedTrigger').innerText = t.speeds[currentSpeedKey];

    // Принудительное обновление списков для iOS
    const featList = document.getElementById('featuresList');
    const guideList = document.getElementById('guideList');
    featList.innerHTML = ''; guideList.innerHTML = '';
    t.features.forEach(f => { const li = document.createElement('li'); li.innerHTML = f; featList.appendChild(li); });
    t.guide.forEach(g => { const li = document.createElement('li'); li.innerHTML = g; guideList.appendChild(li); });
    
    document.getElementById('tabTitleFeatures').innerText = t.tabFeatures;
    document.getElementById('tabTitleGuide').innerText = t.tabGuide;

    audioElements.forEach((el, i) => { el.btn.querySelector('span').innerText = sounds[i].name[lang]; });
}

let audioElements = [];
function initAudioContext() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    globalAnalyser = audioCtx.createAnalyser();
    globalAnalyser.connect(audioCtx.destination);
    if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(l => wakeLock = l).catch(()=>{});
}

// Создание плиток
const grid = document.getElementById('soundGrid');
sounds.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sound-button';
    btn.innerHTML = `<div class="mute-btn">🔊</div><span>${s.name['en']}</span><div class="tile-vis"><div class="tile-vis-bar"></div></div>`;
    grid.appendChild(btn);
    
    const audio = new Audio();
    audio.loop = true; audio.crossOrigin = "anonymous";
    const state = { 
        audio, btn, color: s.color, fileName: s.file, isLoaded: false, 
        visBar: btn.querySelector('.tile-vis-bar'), 
        muteBtn: btn.querySelector('.mute-btn'), 
        gainNode: null, analyser: null, data: null 
    };

    btn.onclick = () => {
        initAudioContext();
        if (!state.isLoaded) {
            state.btn.style.color = "#ffb400";
            audio.src = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${s.file}`;
            audio.load();
            audio.oncanplaythrough = () => { state.isLoaded = true; toggleSound(state); };
        } else { toggleSound(state); }
    };

    state.muteBtn.onclick = (e) => {
        e.stopPropagation();
        state.isMuted = !state.isMuted;
        state.muteBtn.innerText = state.isMuted ? '🔇' : '🔊';
        if (state.gainNode) state.gainNode.gain.setTargetAtTime(state.isMuted ? 0 : 0.6, audioCtx.currentTime, 0.1);
    };

    audioElements.push(state);
});

function toggleSound(el) {
    if (el.btn.classList.contains('active')) {
        el.btn.classList.remove('active');
        el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        setTimeout(() => { if (!el.btn.classList.contains('active')) el.audio.pause(); }, 600);
    } else {
        el.btn.classList.add('active');
        if (!el.gainNode) {
            const source = audioCtx.createMediaElementSource(el.audio);
            el.gainNode = audioCtx.createGain();
            el.analyser = audioCtx.createAnalyser();
            el.analyser.fftSize = 32;
            el.data = new Uint8Array(el.analyser.frequencyBinCount);
            source.connect(el.gainNode).connect(el.analyser).connect(globalAnalyser);
        }
        el.audio.play();
        el.gainNode.gain.setTargetAtTime(el.isMuted ? 0 : 0.6, audioCtx.currentTime, 0.2);
    }
}

// Визуализация
const sCan = document.getElementById('stars'), sCtx = sCan.getContext('2d');
const vCan = document.getElementById('vis'), vCtx = vCan.getContext('2d');
function res() { sCan.width = vCan.width = innerWidth; sCan.height = vCan.height = innerHeight; }
window.onresize = res; res();

const stars = Array.from({length: 50}, () => ({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, r: Math.random()*1.5, s: Math.random()*0.02 }));

function animate() {
    if (!sleepMode) {
        sCtx.clearRect(0,0,innerWidth,innerHeight);
        vCtx.clearRect(0,0,innerWidth,innerHeight);
        sCtx.fillStyle = "white";
        stars.forEach(s => {
            s.x += s.s; if(s.x > innerWidth) s.x = 0;
            sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); sCtx.fill();
        });
    }

    audioElements.forEach(el => {
        if (el.analyser && el.btn.classList.contains('active')) {
            el.analyser.getByteFrequencyData(el.data);
            const avg = el.data.reduce((a,b)=>a+b)/el.data.length;
            if (!sleepMode) {
                el.visBar.style.width = (avg/255)*100 + '%';
                el.btn.style.backgroundColor = el.color.replace('0.5', 0.1 + (avg/255)*0.5);
            } else {
                el.visBar.style.width = '0%';
                el.btn.style.backgroundColor = 'rgba(255,255,255,0.05)';
            }
        } else {
            el.btn.style.backgroundColor = '';
        }
    });
    requestAnimationFrame(animate);
}
animate();

// Управление
function setSpeed(v, k) { currentSpeedValue = v; currentSpeedKey = k; updateUI(); document.getElementById('speedDropdown').classList.remove('open'); }
document.getElementById('speedTrigger').onclick = (e) => { e.stopPropagation(); document.getElementById('speedDropdown').classList.toggle('open'); };
document.querySelectorAll('.lang-switcher-btn').forEach(b => b.onclick = () => { langIdx = (langIdx + 1) % 4; updateUI(); });
document.getElementById('sleepBtn').onclick = () => { sleepMode = !sleepMode; document.body.classList.toggle('fancy-bg', !sleepMode); document.getElementById('stars').classList.toggle('hidden', sleepMode); document.getElementById('vis').classList.toggle('hidden', sleepMode); updateUI(); };
document.getElementById('randomBtn').onclick = () => { 
    randomActive = !randomActive; 
    if (randomActive) { 
        audioElements.forEach(el => { if(!el.isLoaded) el.btn.click(); });
        const cycle = () => {
            if (!randomActive) return;
            const loaded = audioElements.filter(e => e.isLoaded);
            const count = Math.floor(Math.random()*3)+1;
            const shuffle = loaded.sort(()=>0.5-Math.random()).slice(0, count);
            audioElements.forEach(e => { if(shuffle.includes(e)) { if(!e.btn.classList.contains('active')) toggleSound(e); } else { if(e.btn.classList.contains('active')) toggleSound(e); } });
            setTimeout(cycle, currentSpeedValue * 1000);
        };
        cycle();
    }
    updateUI(); 
};
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('closeWelcome').onclick = () => { document.getElementById('welcomeModal').style.display = 'none'; initAudioContext(); };
window.onclick = () => document.getElementById('speedDropdown').classList.remove('open');
</script>
